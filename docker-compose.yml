version: "3.9"

# ======================================================
# AIOps IoT Monitoring - Docker Compose
# ======================================================
# Free-tier deployment:
#   backend  → http://localhost:8000  (push to Docker Hub + Railway/Render)
#   dashboard → http://localhost:8501 (push to Streamlit Community Cloud)
#
# Ollama runs OUTSIDE this compose on your host machine.
# Point OLLAMA_BASE_URL to host.docker.internal (Mac/Win)
# or your host IP on Linux.
#
# Usage:
#   cp .env.example .env          # fill in your values
#   docker-compose up --build     # first run
#   docker-compose up -d          # background
#   docker-compose down -v        # stop + remove volumes
# ======================================================

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aiops_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/aiops_iot.db
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: aiops_dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_API_BASE=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
    driver: local
